name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  lint-test-sonar:
    name: Lint, tests, coverage & SonarQube quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Installed as two separate steps (not one combined `pip install -r a -r
      # b`): requirements.txt pins python-dotenv==1.0.1 while
      # requirements-dev.txt pins python-dotenv==1.2.2, and resolving both
      # files in a single pip invocation fails with ResolutionImpossible.
      # Installing sequentially lets the dev pin win, matching what local
      # development/test runs already assume.
      - name: Install runtime dependencies
        run: pip install -r backend/requirements.txt

      - name: Install dev/test dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff)
        run: cd backend && ruff check .

      # --junitxml alimenta el calculador de metricas ISO (metricas/calcular_metricas.py):
      # de ahi salen MC-01/MC-02 (trazabilidad resuelta) y MC-03 (densidad de fallos).
      - name: Run tests with coverage
        run: |
          cd backend
          mkdir -p Tests/evidencias
          pytest --junitxml=Tests/evidencias/junit_backend.xml \
                 --cov=. --cov-report=xml:coverage.xml

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Check Astro frontend
        run: npm run check
        working-directory: frontend

      - name: Run frontend tests with coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Frontend test report (JSON for the metrics engine)
        run: npx vitest run --reporter=json --outputFile=vitest-results.json
        working-directory: frontend

      - name: Copy/paste detection (jscpd)
        run: npx jscpd --reporters json,html --output report/jscpd || true

      # Quality gate propio del SQAP: aplica las formulas ISO/IEC 25023 y 25022
      # sobre los reportes recien generados y falla (exit 1) si alguna metrica
      # incumple su umbral o si un caso CP-xx perdio la prueba que lo sustenta.
      # Playwright y Locust no corren en CI (necesitan el stack levantado), asi
      # que MC-05..MC-07 y MC-15/MC-16 se omiten con aviso, no con fallo.
      - name: Quality gate ISO (metricas del SQAP)
        run: python metricas/calcular_metricas.py

      - name: Upload metrics report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metricas-sqap
          path: metricas/salida/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.qualitygate.wait=true
