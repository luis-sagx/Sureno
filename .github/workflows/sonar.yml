name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  lint-test-sonar:
    name: Lint, tests, coverage & SonarQube quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Installed as two separate steps (not one combined `pip install -r a -r
      # b`): requirements.txt pins python-dotenv==1.0.1 while
      # requirements-dev.txt pins python-dotenv==1.2.2, and resolving both
      # files in a single pip invocation fails with ResolutionImpossible.
      # Installing sequentially lets the dev pin win, matching what local
      # development/test runs already assume.
      - name: Install runtime dependencies
        run: pip install -r backend/requirements.txt

      - name: Install dev/test dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff)
        run: cd backend && ruff check .

      - name: Run tests with coverage
        run: cd backend && pytest --cov=. --cov-report=xml:coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.qualitygate.wait=true
